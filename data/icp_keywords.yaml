# 음주측정기(ALCOFIND / DA Tech) B2B 잠재 구매처 ICP 사전.
# 여기 키워드는 네이버 지도의 `category` 또는 `title` 텍스트에 토큰으로 포함되면
# 점수에 반영됩니다. 운영하면서 자유롭게 보강하세요.

positive:
  건설:        [건설, 종합건설, 전문건설, 건축, 토목, 시공, 인테리어시공, 플랜트, 토건]
  운수물류:    [운수, 운송, 물류, 화물, 택시, 버스, 해운, 항공, 창고, 택배, 운송업, 물류센터, 운수회사]
  제조중공업:  [제조업, 제조, 화학, 정유, 석유, 발전, 중공업, 중장비, 굴착, 크레인, 조선, 광업, 철강, 시멘트, 자동차부품, 산업기계]
  안전시설:    [산업안전, 안전관리, 시설관리, 경비, 보안, 청소, 환경관리]
  공공기관:    [공사, 공단, 공기업, 지방자치단체, 시청, 군청, 구청, 경찰, 소방, 군부대, 교정시설]
  의료교육:    [종합병원, 대학병원, 대학교, 전문대학, 직업훈련원]
  에너지:      [발전소, 한전, 가스공사, 수자원, 발전회사]

negative:
  소매서비스:  [음식점, 카페, 식당, 미용실, 미용원, "PC방", 노래방, 편의점, 꽃집, 옷가게, 부동산중개, 분식, 치킨, 호프]
  영세개인:    [치과의원, 한의원, 학원, 교습소, 공인중개사사무소, 네일샵, 피부관리]

weights:
  hint_address_match:   5     # 사용자 엑셀의 지역 힌트와 후보 주소 일치
  hint_category_match:  3     # 사용자 엑셀의 업종 힌트와 후보 카테고리 일치
  icp_positive:         3     # 카테고리/제목에 양성 키워드 매치당
  icp_negative:         -3    # 음성 키워드 매치당
  exact_name:           2     # 검색어와 후보명 정규화 완전일치
  partial_name:         1     # 검색어 토큰이 후보명에 포함
  headquarters_marker:  1     # "본사", "본점", "주식회사", "(주)" 포함
  branch_marker:        -1    # "지점", "영업소", "출장소", "센터", "매장" 포함

thresholds:
  match_threshold:      1     # 후보 최소 점수 (이하면 후보 제외)
  ambiguous_gap:        2     # 1·2위 점수 차이 < 이 값이면 "확정필요"
